on:
  push:
    branches: [main]
  workflow_dispatch:

name: Quarto Publish

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      RENV_PROFILE: default
      RENV_PATHS_LIBRARY_ROOT: ~/.cache/R/renv/library
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: renv
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libglpk-dev libpoppler-cpp-dev libcurl4-openssl-dev libxml2-dev

      - name: Cache renv library
        uses: actions/cache@v4
        with:
          path: ~/.cache/R/renv/library
          key: renv-default-${{ runner.os }}-${{ hashFiles('renv.lock') }}
          restore-keys: renv-default-${{ runner.os }}-

      - name: Restore renv
        run: |
          if (!requireNamespace("renv", quietly = TRUE)) install.packages("renv")
          renv::restore(prompt = FALSE)
        shell: Rscript {0}

      - name: Build with targets
        run: targets::tar_make()
        shell: Rscript {0}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
