name: Weekly Literature Search

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            europepmc
            httr
            jsonlite
          cache-version: 1

      - name: Run search pipeline
        run: Rscript .github/scripts/run-search.R

      - name: Audit outcome domain categories (first Monday of month)
        run: |
          DAY=$(date -u +%d)
          if [ "$DAY" -le 7 ]; then
            Rscript scripts/audit-categories.R
          else
            echo "Skipping — not the first week of the month"
          fi

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "$(cat <<'EOF'
          Update study database from weekly search

          Automated literature search run on $(date -u +%Y-%m-%d).
          See data/last-run-summary.json for details.
          EOF
          )"
          git push

  render:
    needs: search
    if: needs.search.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          packages: |
            metafor
            ggplot2
            dplyr
            forcats
            scales
            DT
            jsonlite
            knitr
            rmarkdown
          cache-version: 1

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Render site
        run: quarto render

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
