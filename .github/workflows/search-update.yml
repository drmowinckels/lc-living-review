name: Weekly Literature Search

on:
  schedule:
    - cron: '0 6 * * 1'  # Every Monday at 06:00 UTC
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    env:
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      RENV_PROFILE: search
      RENV_PATHS_LIBRARY_ROOT: ~/.cache/R/renv/library

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: renv
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libpoppler-cpp-dev libcurl4-openssl-dev libxml2-dev

      - name: Cache renv library
        uses: actions/cache@v4
        with:
          path: ~/.cache/R/renv/library
          key: renv-search-${{ runner.os }}-${{ hashFiles('renv/profiles/search/renv.lock') }}
          restore-keys: renv-search-${{ runner.os }}-

      - name: Restore renv (search profile)
        run: |
          if (!requireNamespace("renv", quietly = TRUE)) install.packages("renv")
          renv::restore(prompt = FALSE)
        shell: Rscript {0}

      - name: Run search pipeline
        run: Rscript .github/scripts/run-search.R

      - name: Monthly audits (first Monday of month)
        run: |
          DAY=$(date -u +%d)
          if [ "$DAY" -le 7 ]; then
            echo "=== Outcome domain audit ==="
            Rscript scripts/audit-categories.R
            echo "=== Data quality audit ==="
            Rscript scripts/audit-data-quality.R
          else
            echo "Skipping monthly audits — not the first week of the month"
          fi

      - name: Re-extract manual studies (until rate limited)
        run: Rscript scripts/reextract-manual.R

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "$(cat <<'EOF'
          Update study database from weekly search

          Automated literature search run on $(date -u +%Y-%m-%d).
          See data/last-run-summary.json for details.
          EOF
          )"
          git push

  render:
    needs: search
    if: needs.search.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
    env:
      RENV_PROFILE: default
      RENV_PATHS_LIBRARY_ROOT: ~/.cache/R/renv/library

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: r-lib/actions/setup-r@v2
        with:
          r-version: renv
          use-public-rspm: true

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y libglpk-dev libpoppler-cpp-dev libcurl4-openssl-dev libxml2-dev

      - name: Cache renv library
        uses: actions/cache@v4
        with:
          path: ~/.cache/R/renv/library
          key: renv-default-${{ runner.os }}-${{ hashFiles('renv.lock') }}
          restore-keys: renv-default-${{ runner.os }}-

      - name: Restore renv (default profile)
        run: |
          if (!requireNamespace("renv", quietly = TRUE)) install.packages("renv")
          renv::restore(prompt = FALSE)
        shell: Rscript {0}

      - uses: quarto-dev/quarto-actions/setup@v2

      - name: Run targets pipeline
        run: targets::tar_make()
        shell: Rscript {0}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
